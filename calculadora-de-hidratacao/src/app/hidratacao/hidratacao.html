<title>Beba água🫗</title>
<h1>Consulta de Hidratação</h1>
<input type="number" [(ngModel)]="peso" placeholder="Peso (kg)">
<select [(ngModel)]="atividade"><option value="sedentário">Sedentário</option>
    <option value="moderado">Moderado</option>
    <option value="intenso">Intenso</option></select>
<button (click)="calcularHidratacao()">Calcular</button><br>
<div *ngIf="litros > 0">
    <p>Você deve tomar <strong>{{ litros | number: '1.1-2' }} litros.</strong></p>
    <p>Isso dá <strong>{{ garrafas }} garrafas</strong> de 500ml!</p>
  <p>🍃 Quanto menos plásticos, mais saúde para o planeta! 🌱</p>
</div>
